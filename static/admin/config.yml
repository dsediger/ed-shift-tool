# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: dsediger/ed-shift-tool

media_folder: /public/media
public_folder: /media

collections:
  - name: teaching
    label: Teaching notes
    label_singular: Teaching
    folder: /content/teaching
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }

  - name: ecg
    label: ECGs
    label_singular: ECGs
    folder: /content/ecg
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }
  
  - name: documentation
    label: Documentation
    label_singular: Documentation
    folder: /content/documentation
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }